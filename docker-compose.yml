version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mercadofacil-db
    environment:
      POSTGRES_DB: mercadofacildb
      POSTGRES_USER: mercadofacil
      POSTGRES_PASSWORD: mercadofacil123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercadofacil -d mercadofacildb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercadofacil-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mercadofacildb
      DB_USER: mercadofacil
      DB_PASS: mercadofacil123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: mercadofacil_postgres_data
