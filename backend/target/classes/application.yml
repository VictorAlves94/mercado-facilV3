# ================================================
# MercadoFácil - Configuração Principal
# ================================================
spring:
  application:
    name: mercadofacil-backend
  profiles:
    active: dev

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Sao_Paulo
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

# JWT
app:
  jwt:
    secret: bWVyY2Fkb2ZhY2lsLWJhY2tlbmQtc2VjcmV0LWtleS0yMDI2LW11aXRvLXNlZ3VyYQ==
    expiration: 86400000   # 24 horas em ms
  estoque:
    alerta-minimo: 10      # alertar abaixo de 10 unidades
  versao: 1.0.0

---
# ================================================
# PERFIL: DEV (H2 em memória)
# ================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:mercadofacildb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data-dev.sql
---
# ================================================
# PERFIL: PROD (PostgreSQL)
# ================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mercadofacildb}
    username: ${DB_USER:mercadofacil}
    password: ${DB_PASS:mercadofacil123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  sql:
    init:
      mode: never

logging:
  level:
    com.mercadofacil: INFO
    root: WARN
